<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChaiTailwind &mdash; style your code with simple class</title>
  </head>
  <body class="chai-dark">
    <!-- heading -->
    <div class="heading">
      <h1 class="chai-h-1">Chaicode H1</h1>
      <h1 class="chai-h-2">Chaicode H2</h1>
      <h1 class="chai-h-3">Chaicode H3</h1>
      <h1 class="chai-h-4">Chaicode H4</h1>
      <h1 class="chai-h-5">Chaicode H5</h1>
      <h1 class="chai-h-6">Chaicode H6</h1>
    </div>
    <!-- paragraph -->
    <p class="chai-p-lg">
      This is Chai Tailwind Framework. It provides styles class which is based
      on chai theme and all class start from chai-*
    </p>
    <p class="chai-p-md">it is challenge given by our Hitesh Sir</p>
    <p class="chai-p-sm">Made with Love and Fun</p>
    <script type="module" src="./styles.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
